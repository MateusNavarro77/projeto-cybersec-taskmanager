<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>App | Cybersec Taskmanager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/app}">Cybersec Taskmanager</a>
        <form method="post" th:action="@{/app/logout}">
            <button class="btn btn-outline-secondary btn-sm" type="submit">Sign out</button>
        </form>
    </div>
</nav>
<main class="container py-5">
    <section class="bg-white border rounded-2 p-4 p-md-5 shadow-sm">
        <p class="text-secondary mb-2">Signed in as</p>
        <h1 class="h3 fw-bold mb-3" th:text="${username}">user</h1>
        <p class="text-secondary mb-0">The task workspace will be built here next.</p>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
