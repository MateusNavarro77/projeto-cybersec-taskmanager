<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Cybersec Taskmanager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <section class="w-100" style="max-width: 440px;">
        <div class="mb-4">
            <p class="text-uppercase text-secondary fw-semibold small mb-2">Cybersec Taskmanager</p>
            <h1 class="h3 fw-bold mb-2">Sign in</h1>
            <p class="text-secondary mb-0">Access your secure task workspace.</p>
        </div>

        <div class="alert alert-success" role="alert" th:if="${registrationSuccess}" th:text="${registrationSuccess}"></div>
        <div class="alert alert-danger" role="alert" th:if="${loginError}" th:text="${loginError}"></div>

        <form class="card border-0 shadow-sm" method="post" th:action="@{/app/login}" th:object="${loginRequest}">
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" th:field="*{email}" autocomplete="email" required autofocus>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" id="password" type="password" th:field="*{password}" autocomplete="current-password" required>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <button class="btn btn-primary w-100" type="submit">Sign in</button>
            </div>
        </form>

        <p class="text-center text-secondary mt-4 mb-0">
            New here?
            <a th:href="@{/app/register}">Create an account</a>
        </p>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
