name: Integration Tests and Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Integration Tests with Coverage
        run: ./mvnw clean verify -Dspring.profiles.active=integrationtest -Ddependency-check.skip=true

      - name: Upload Integration Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-integration-coverage-report
          path: target/site/jacoco-it/
          if-no-files-found: warn
