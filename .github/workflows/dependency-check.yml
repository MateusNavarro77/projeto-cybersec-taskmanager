name: Dependency Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          architecture: x64
          cache: maven

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache OWASP Dependency Check Database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: dependency-check-database-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            dependency-check-database-${{ runner.os }}-

      - name: Run OWASP dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B dependency-check:check -Dnvd.api.key=${{ secrets.NVD_API_KEY }} -DdataDirectory=$HOME/.dependency-check

      - name: Upload dependency-check HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-html-report
          path: target/dependency-check-report.html
          if-no-files-found: warn
