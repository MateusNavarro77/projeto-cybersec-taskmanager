services:
  postgres:
    image: postgres:17
    container_name: secure-task-manager-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: secure_task_manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d secure_task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: